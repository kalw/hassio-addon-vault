worker_processes 1;
error_log /proc/1/fd/2 notice;
pid /tmp/nginx.pid;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log off;
    sendfile on;
    keepalive_timeout 65;

    include /tmp/vault-ingress.conf;
}
