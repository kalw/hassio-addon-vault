---
name: Packages Cleanup

# yamllint disable-line rule:truthy
on:
  # zizmor: ignore[dangerous-triggers]
  # Safe: restricted to branches: [main] so fork PRs cannot trigger this.
  workflow_run:
    workflows: ["Deploy"]
    branches: [main]
    types:
      - completed

permissions:
  packages: write

jobs:
  cleanup:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - hassio-addon-vault
          - hassio-addon-vault/amd64
          - hassio-addon-vault/aarch64
    steps:
      - name: Delete untagged package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ matrix.package }}
        # yamllint disable rule:line-length
        run: |
          encoded=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''))" "$PACKAGE")
          jq_filter='[.[] | select(.metadata.container.tags | length == 0) | .id] | .[]'
          ids=$(gh api --paginate "/users/$OWNER/packages/container/$encoded/versions" \
            --jq "$jq_filter" || true)
          if [ -z "$ids" ]; then
            echo "No untagged versions found for $PACKAGE"
            exit 0
          fi
          echo "Untagged versions in $PACKAGE: $(echo "$ids" | wc -w)"
          for id in $ids; do
            api_path="/users/$OWNER/packages/container/$encoded/versions/$id"
            gh api --method DELETE "$api_path" \
              && echo "Deleted $id" \
              || echo "Could not delete $id (may be protected)"
          done
        # yamllint enable rule:line-length

  dispatch-edge:
    name: 📢 Re-dispatch edge repository updater
    needs: cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Get short SHA
        id: sha
        env:
          FULL_SHA: ${{ github.event.workflow_run.head_sha }}
        run: echo "short=${FULL_SHA:0:7}" >> "$GITHUB_OUTPUT"
      - name: 🚀 Dispatch repository updater update signal
        # yamllint disable-line rule:line-length
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/hassio-addons-edge
          event-type: update
          client-payload: >
            {
              "app": "hassio-addon-vault",
              "name": "Vault",
              "repository": "${{ github.repository }}",
              "version": "${{ steps.sha.outputs.short }}"
            }
