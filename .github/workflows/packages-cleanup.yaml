---
name: Packages Cleanup

# yamllint disable-line rule:truthy
on:
  # zizmor: ignore[dangerous-triggers]
  # Safe: restricted to branches: [main] so fork PRs cannot trigger this.
  workflow_run:
    workflows: ["Deploy"]
    branches: [main]
    types:
      - completed

permissions:
  packages: write

jobs:
  cleanup:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - hassio-addon-vault
          - hassio-addon-vault/amd64
          - hassio-addon-vault/aarch64
    steps:
      - name: Delete untagged package versions
        # yamllint disable-line rule:line-length
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          delete-only-untagged-versions: true
          token: ${{ secrets.GITHUB_TOKEN }}

  dispatch-edge:
    name: 📢 Re-dispatch edge repository updater
    needs: cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Get short SHA
        id: sha
        env:
          FULL_SHA: ${{ github.event.workflow_run.head_sha }}
        run: echo "short=${FULL_SHA:0:7}" >> "$GITHUB_OUTPUT"
      - name: 🚀 Dispatch repository updater update signal
        # yamllint disable-line rule:line-length
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/hassio-addons-edge
          event-type: update
          client-payload: >
            {
              "app": "hassio-addon-vault",
              "name": "Vault",
              "repository": "${{ github.repository }}",
              "version": "${{ steps.sha.outputs.short }}"
            }
